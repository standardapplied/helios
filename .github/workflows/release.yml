name: Release

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:

concurrency:
  group: maven-central-release
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Resolve project version
        id: version
        run: echo "version=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Refuse to deploy an already-published version
        run: |
          V="${{ steps.version.outputs.version }}"
          URL="https://repo.maven.apache.org/maven2/ai/singlr/helios-core/${V}/helios-core-${V}.pom"
          if curl -sfI "$URL" > /dev/null; then
            echo "::error::helios ${V} is already published to Maven Central — bump the version instead of re-releasing. Refusing to create a duplicate deployment."
            exit 1
          fi
          echo "helios ${V} is not on Maven Central yet; proceeding."

      - name: Deploy to Maven Central
        run: mvn clean deploy -Prelease --batch-mode -pl core,session,runtime,gemini,anthropic,openai,onnx,persistence,repl,testing
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
